<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FAT BROKE - Today</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="lifeos.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="iconbtn" id="backBtn" style="display:none">←</button>
    <div class="brand"><h2>FAT BROKE</h2><div class="sub" id="barSub"></div></div>
    <button class="iconbtn" id="editBtn" onclick="toggleEdit()" title="Edit">✎</button>
    <a class="iconbtn" href="settings.html" title="Settings">⚙</a>
  </div>

  <div class="view active" id="today"></div>

  <div class="tabbar">
    <a id="tabToday" class="on" href="index.html"><span class="ic">🌞</span>Today</a>
    <a id="tabGym" href="gym.html"><span class="ic">🏋️</span>Gym</a>
    <a id="tabWork" href="work.html"><span class="ic">💼</span>Work</a>
    <a id="tabFood" href="food.html"><span class="ic">🍳</span>Fuel</a>
    <a id="tabProg" href="progress.html"><span class="ic">📊</span>Progress</a>
  </div>
</div>

<script src="shared.js"></script>
<script>
let openB = {};
function goToday() {
  renderToday();
  const sub = document.getElementById('barSub');
  if (sub) sub.textContent = dateStr();
  hideBack();
}

function curBlockIndex(flow) {
  var nm = nowMin();
  var cur = -1;
  flow.forEach(function (b, i) {
    var t = pmin(b.time);
    if (t != null && t <= nm) cur = i;
  });
  return cur;
}

function renderToday() {
  var c = cfg(), flow = c.flow, s = planState();
  var cur = curBlockIndex(flow);
  var tot = 0, dn = 0;
  flow.forEach(function (b) {
    (b.subs || []).forEach(function (_, i) {
      tot++;
      if (s.blocks[b.id] && s.blocks[b.id][i]) dn++;
    });
  });
  var pct = tot ? dn / tot : 0;
  var curB = flow[cur];
  var html = '';
  
  if (EDIT) {
    html += '<div class="eyebrow">Edit your day</div><h1 class="title">Your flow</h1><p class="muted-p">Change the emoji, time, name or steps of any block. Add or remove anything. Tap ✎ again when done.</p>';
    flow.forEach(function (b) { html += editBlock(b); });
    html += '<button class="mini" style="margin-top:6px" onclick="addBlk()">+ Add a block</button>';
    html += '<div class="sectit">Cheat codes (habits)</div>';
    c.habits.forEach(function (h, i) {
      html += '<div class="esub"><input class="einp eemoji" value="' + esc(h.e) + '" oninput="setHabit(' + i + ',\'e\',this.value)"><input class="einp" value="' + esc(h.l) + '" oninput="setHabit(' + i + ',\'l\',this.value)"><button onclick="delHabit(' + i + ')">\u00d7</button></div>';
    });
    html += '<button class="mini" style="margin-top:8px" onclick="addHabit()">+ Add habit</button>';
    document.getElementById('today').innerHTML = html;
    return;
  }
  
  const now = new Date();
  const hr = now.getHours();
  
  // 1. Morning Check-in (6:00 AM to 6:00 PM)
  const morningActive = (hr >= 6 && hr < 18);
  let showMorningCheckin = false;
  let showCoffeeCheckin = false;
  
  if (morningActive) {
    // Check coffee first!
    const fState = lsGet('jae_food_' + todayKey(), null);
    const hasCoffee = fState && fState.coffee >= 1;
    
    if (!hasCoffee) {
      showCoffeeCheckin = true;
    } else {
      // Coffee logged, now check weight + waist!
      const bodyLogs = lsGet('jae_body_logs_v1', []);
      const todayBody = bodyLogs.find(l => l.date === todayKey());
      const hasWeight = todayBody && Number.isFinite(todayBody.weight);
      const hasWaist = todayBody && Number.isFinite(todayBody.waist);
      
      if (!hasWeight || !hasWaist) {
        showMorningCheckin = true;
      }
    }
  }
  
  // 2. Evening supplements check-in (8:00 PM to 6:00 AM next day)
  const isEvening = (hr >= 20 || hr < 6);
  let showSuppCheckin = false;
  let suppTargetDate = todayKey();
  
  if (isEvening && !showMorningCheckin && !showCoffeeCheckin) {
    if (hr < 6) {
      suppTargetDate = getYesterdayKey();
    }
    const fState = lsGet('jae_food_' + suppTargetDate, null) || { supps: [] };
    const creatineIdx = c.supps.findIndex(sp => /creatine/i.test(sp.name));
    const magnesiumIdx = c.supps.findIndex(sp => /magnesium/i.test(sp.name));
    
    const hasCreatine = (creatineIdx >= 0) ? (fState.supps[creatineIdx] >= 1) : true;
    const hasMagnesium = (magnesiumIdx >= 0) ? (fState.supps[magnesiumIdx] >= 1) : true;
    
    if (!hasCreatine || !hasMagnesium) {
      showSuppCheckin = true;
    }
  }
  
  if (showCoffeeCheckin) {
    html += '<div class="card" style="margin-bottom:20px;text-align:center;padding:20px 16px;background:rgba(108,140,255,0.06);border:1px solid rgba(108,140,255,0.2)">';
    html += '  <div class="eyebrow" style="margin:0 0 4px 0;text-transform:uppercase;font-size:10.5px;letter-spacing:1px;color:var(--good)">Action Required</div>';
    html += '  <h2 style="font-size:18px;margin-bottom:6px;font-weight:700;color:var(--text)">☕ Morning Coffee</h2>';
    html += '  <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px">Log your first coffee of the day to unlock the weight check-in.</p>';
    html += '  <button class="cta" onclick="saveTodayCoffee()">✓ Log first coffee</button>';
    html += '</div>';
  }
  
  if (showMorningCheckin) {
    html += '<div class="card" style="margin-bottom:20px;padding:16px;background:rgba(108,140,255,0.06);border:1px solid rgba(108,140,255,0.2)">';
    html += '  <div class="eyebrow" style="margin:0 0 4px 0;text-transform:uppercase;font-size:10.5px;letter-spacing:1px;color:var(--good)">Action Required</div>';
    html += '  <h2 style="font-size:18px;margin-bottom:6px;font-weight:700;color:var(--text)">📊 Weight & Waist Check-in</h2>';
    html += '  <p style="font-size:12.5px;color:var(--muted);margin-bottom:12px">Enter today\'s weight and waist stats to complete morning registration.</p>';
    html += '  <div class="bodygrid" style="display:grid;grid-template-columns:1fr 1fr;gap:9px">';
    html += '    <div class="field" style="display:flex;flex-direction:column">';
    html += '      <label style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px">Weight (kg)</label>';
    html += '      <input id="todayWeightIn" type="number" step="0.05" inputmode="decimal" placeholder="63.4" style="padding:10px 11px;border-radius:12px;border:var(--glass-border);background:var(--surface2);color:var(--text);font-size:15px">';
    html += '    </div>';
    html += '    <div class="field" style="display:flex;flex-direction:column">';
    html += '      <label style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px">Waist (in)</label>';
    html += '      <input id="todayWaistIn" type="number" step="0.1" inputmode="decimal" placeholder="31.5" style="padding:10px 11px;border-radius:12px;border:var(--glass-border);background:var(--surface2);color:var(--text);font-size:15px">';
    html += '    </div>';
    html += '  </div>';
    html += '  <button class="cta" style="margin-top:12px;width:100%" onclick="saveTodayBody()">✓ Save check-in</button>';
    html += '</div>';
  }
  
  if (showSuppCheckin) {
    const fState = lsGet('jae_food_' + suppTargetDate, null) || { supps: [] };
    const creatineIdx = c.supps.findIndex(sp => /creatine/i.test(sp.name));
    const magnesiumIdx = c.supps.findIndex(sp => /magnesium/i.test(sp.name));
    
    const hasCreatine = (creatineIdx >= 0) ? (fState.supps[creatineIdx] >= 1) : true;
    const hasMagnesium = (magnesiumIdx >= 0) ? (fState.supps[magnesiumIdx] >= 1) : true;
    
    html += '<div class="card" style="margin-bottom:20px;padding:16px;background:rgba(154,124,255,0.06);border:1px solid rgba(154,124,255,0.2);display:flex;flex-direction:column;gap:10px">';
    html += '  <div class="eyebrow" style="margin:0 0 2px 0;text-transform:uppercase;font-size:10.5px;letter-spacing:1px;color:var(--good)">Supplement Checklist</div>';
    html += '  <h2 style="font-size:18px;margin-bottom:2px;font-weight:700;color:var(--text)">💊 Evening Supplements</h2>';
    html += '  <p style="font-size:12.5px;color:var(--muted);margin-bottom:4px">Log your evening supplements before bed.</p>';
    
    if (!hasCreatine) {
      html += '  <button class="cta" onclick="saveTodaySupp(' + creatineIdx + ', \'' + suppTargetDate + '\')">✓ Take Creatine (5g)</button>';
    } else {
      html += '  <div style="padding:10px;border-radius:12px;background:rgba(16,185,129,0.1);color:var(--good);text-align:center;font-weight:700;font-size:13px">✓ Creatine Taken</div>';
    }
    
    if (!hasMagnesium) {
      html += '  <button class="cta" onclick="saveTodaySupp(' + magnesiumIdx + ', \'' + suppTargetDate + '\')">✓ Take Magnesium</button>';
    } else {
      html += '  <div style="padding:10px;border-radius:12px;background:rgba(16,185,129,0.1);color:var(--good);text-align:center;font-weight:700;font-size:13px">✓ Magnesium Taken</div>';
    }
    
    html += '</div>';
  }
  
  // 1. Focus header first
  html += '<div class="fhead" style="margin-top:0"><div><div class="nowlbl">' + (curB ? 'Right now' : 'Your day') + '</div><div class="nowttl">' + (curB ? esc(curB.title) : 'Plan the day') + '</div><div class="nowsub">' + (curB ? disp(curB.time) : dateStr()) + '</div></div><div class="ring">' + ringSvg(pct, Math.round(pct * 100) + '%', 'done') + '</div></div>';
  
  // 2. Custom tasks second
  html += '<div class="sectit" style="margin-top:16px">Add your own task</div>';
  html += '<div class="addrow"><input id="planTaskIn" placeholder="Anything else for today" onkeydown="if(event.key===\'Enter\')addTask()"><button onclick="addTask()">+</button></div><div id="planTasks"></div>';
  
  // 3. Habits (cheat codes) third
  html += '<div class="sectit" style="margin-top:16px">Today\u2019s cheat codes</div><div class="habits" id="habitGrid"></div>';
  
  // 4. Daily flow fourth
  html += '<div class="sectit" style="margin-top:16px">Schedule</div>';
  flow.forEach(function (b, i) { html += viewBlock(b, i, cur, s); });

  document.getElementById('today').innerHTML = html;
  renderTasks();
  renderHabits();
}

function viewBlock(b, i, cur, s) {
  var st = s.blocks[b.id] || [];
  var subs = b.subs || [];
  var done = 0;
  subs.forEach(function (_, j) { if (st[j]) done++; });
  var isCur = (i === cur);
  var isPast = (cur >= 0 && i < cur);
  var open = (b.id in openB) ? openB[b.id] : isCur;
  var cls = 'blk ' + (b.color || '') + (isCur ? ' now' : '') + (isPast ? ' past' : '') + (open ? ' open' : '');
  var h = '<div class="' + cls + '"><div class="bhd" onclick="toggleOpen(\'' + b.id + '\',' + i + ')"><span class="be">' + esc(b.emoji) + '</span><div class="bm"><div class="bt">' + disp(b.time) + '</div><div class="bh">' + esc(b.title) + '</div></div>' + (subs.length ? '<span class="bcount' + (done === subs.length ? ' done' : '') + '">' + done + '/' + subs.length + '</span>' : '') + '<span class="bchev">\u203a</span></div>';
  
  if (open) {
    if (subs.length) {
      h += '<div class="subs">';
      subs.forEach(function (sub, j) {
        var on = !!st[j];
        h += '<div class="subrow' + (on ? ' done' : '') + '" onclick="toggleSub(\'' + b.id + '\',' + j + ')"><span class="subcbx' + (on ? ' on' : '') + '">\u2713</span><span class="stx">' + esc(sub) + '</span></div>';
      });
      h += '</div>';
    }
    if (b.action === 'gym') h += '<div class="blkact"><a class="cta" href="gym.html">Open workout \u2192</a></div>';
    if (b.action === 'work') h += '<div class="blkact"><a class="cta" href="work.html">Open work block \u2192</a></div>';
  }
  h += '</div>';
  return h;
}

function editBlock(b) {
  var subs = b.subs || [];
  var h = '<div class="blk ' + (b.color || '') + '">';
  h += '<div class="erow"><input class="einp eemoji" value="' + esc(b.emoji) + '" oninput="setBlk(\'' + b.id + '\',\'emoji\',this.value)"><input type="time" class="etime" value="' + esc(b.time) + '" onchange="setBlk(\'' + b.id + '\',\'time\',this.value,true)"></div>';
  h += '<input class="etitle" value="' + esc(b.title) + '" oninput="setBlk(\'' + b.id + '\',\'title\',this.value)">';
  h += '<div class="esubs">';
  subs.forEach(function (sub, j) {
    h += '<div class="esub"><input class="einp" value="' + esc(sub) + '" oninput="setSub(\'' + b.id + '\',' + j + ',this.value)"><button onclick="delSub(\'' + b.id + '\',' + j + ')">\u00d7</button></div>';
  });
  h += '</div>';
  h += '<div class="etools"><button class="mini" onclick="addSub(\'' + b.id + '\')">+ step</button>';
  h += '<select onchange="setBlk(\'' + b.id + '\',\'color\',this.value,true)">';
  COLORS.forEach(function (col) { h += '<option value="' + col + '"' + (b.color === col ? ' selected' : '') + '>' + col + '</option>'; });
  h += '</select>';
  h += '<select onchange="setBlk(\'' + b.id + '\',\'action\',this.value)"><option value=""' + (!b.action ? ' selected' : '') + '>no button</option><option value="gym"' + (b.action === 'gym' ? ' selected' : '') + '>Gym button</option><option value="work"' + (b.action === 'work' ? ' selected' : '') + '>Work button</option></select>';
  h += '<button class="mini" onclick="moveBlk(\'' + b.id + '\',-1)">\u2191</button><button class="mini" onclick="moveBlk(\'' + b.id + '\',1)">\u2193</button>';
  h += '<button class="mini danger" onclick="delBlk(\'' + b.id + '\')">Delete</button></div></div>';
  return h;
}

function toggleOpen(id, i) {
  var c = cfg();
  var cur = curBlockIndex(c.flow);
  var isCur = (i === cur);
  var open = (id in openB) ? openB[id] : isCur;
  openB[id] = !open;
  renderToday();
}

function toggleSub(id, j) {
  var s = planState();
  var arr = s.blocks[id] || [];
  arr[j] = !arr[j];
  s.blocks[id] = arr;
  savePlanState(s);
  openB[id] = true;
  renderToday();
  pushDay();
}

function findBlk(c, id) {
  for (var i = 0; i < c.flow.length; i++) if (c.flow[i].id === id) return c.flow[i];
  return null;
}

function setBlk(id, f, v, re) {
  var c = cfg();
  var b = findBlk(c, id);
  if (!b) return;
  b[f] = v;
  saveCfg(c);
  if (re) renderToday();
}

function setSub(id, j, v) {
  var c = cfg();
  var b = findBlk(c, id);
  if (!b) return;
  b.subs = b.subs || [];
  b.subs[j] = v;
  saveCfg(c);
}

function addSub(id) {
  var c = cfg();
  var b = findBlk(c, id);
  if (!b) return;
  b.subs = b.subs || [];
  b.subs.push('New step');
  saveCfg(c);
  renderToday();
}

function delSub(id, j) {
  var c = cfg();
  var b = findBlk(c, id);
  if (!b) return;
  b.subs.splice(j, 1);
  saveCfg(c);
  renderToday();
}

function delBlk(id) {
  var c = cfg();
  c.flow = c.flow.filter(function (b) { return b.id !== id; });
  saveCfg(c);
  renderToday();
}

function moveBlk(id, d) {
  var c = cfg();
  var i = c.flow.findIndex(function (b) { return b.id === id; });
  var j = i + d;
  if (i < 0 || j < 0 || j >= c.flow.length) return;
  var t = c.flow[i];
  c.flow[i] = c.flow[j];
  c.flow[j] = t;
  saveCfg(c);
  renderToday();
}

function addBlk() {
  var c = cfg();
  c.flow.push({ id: 'b' + Date.now(), emoji: '⭐', time: '12:00', title: 'New block', color: 'blue', subs: ['New step'] });
  saveCfg(c);
  renderToday();
}

function setHabit(i, f, v) {
  var c = cfg();
  if (!c.habits[i]) return;
  c.habits[i][f] = v;
  saveCfg(c);
}

function addHabit() {
  var c = cfg();
  c.habits.push({ k: 'h' + Date.now(), e: '✅', l: 'New habit' });
  saveCfg(c);
  renderToday();
}

function delHabit(i) {
  var c = cfg();
  c.habits.splice(i, 1);
  saveCfg(c);
  renderToday();
}

function renderHabits() {
  var c = cfg(), s = planState();
  var g = document.getElementById('habitGrid');
  if (!g) return;
  g.innerHTML = '';
  c.habits.forEach(function (h) {
    var on = !!s.habits[h.k];
    var d = document.createElement('div');
    d.className = 'hbtn' + (on ? ' on' : '');
    d.innerHTML = '<span class="he">' + esc(h.e) + '</span><span class="hl">' + esc(h.l) + '</span><span class="hk">\u2713</span>';
    d.onclick = function () { toggleHabit(h.k); };
    g.appendChild(d);
  });
}

function toggleHabit(k) {
  var s = planState();
  s.habits[k] = !s.habits[k];
  savePlanState(s);
  renderHabits();
  pushDay();
}

function getTasks() { return planState().tasks; }

function addTask() {
  var inp = document.getElementById('planTaskIn');
  var v = (inp.value || '').trim();
  if (!v) return;
  var s = planState();
  s.tasks.push({ tx: v, done: false });
  savePlanState(s);
  inp.value = '';
  renderTasks();
  pushDay();
}

function toggleTask(i) {
  var s = planState();
  s.tasks[i].done = !s.tasks[i].done;
  savePlanState(s);
  renderTasks();
  pushDay();
}

function delTask(i) {
  var s = planState();
  s.tasks.splice(i, 1);
  savePlanState(s);
  renderTasks();
  pushDay();
}

function renderTasks() {
  var el = document.getElementById('planTasks');
  if (!el) return;
  var arr = getTasks();
  if (!arr.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = '';
  arr.forEach(function (t, i) {
    var d = document.createElement('div');
    d.className = 'trow' + (t.done ? ' done' : '');
    d.innerHTML = '<div class="cbx ' + (t.done ? 'on' : '') + '">\u2713</div><div class="tx">' + esc(t.tx) + '</div><button class="del">\u00d7</button>';
    d.querySelector('.cbx').onclick = function () { toggleTask(i); };
    d.querySelector('.tx').onclick = function () { toggleTask(i); };
    d.querySelector('.del').onclick = function () { delTask(i); };
    el.appendChild(d);
  });
}

function planState() {
  const k = 'jae_plan_' + todayKey();
  let s = lsGet(k, null);
  if (!s) {
    s = { tasks: [], habits: {}, blocks: {} };
    lsSet(k, s);
  }
  s.habits = s.habits || {};
  s.blocks = s.blocks || {};
  s.tasks = s.tasks || [];
  return s;
}

function savePlanState(s) {
  var k = 'jae_plan_' + todayKey();
  lsSet(k, s);
  syncPush(k, s);
}

function refresh() {
  renderToday();
}

function getYesterdayKey() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

window.saveTodayBody = function() {
  const w = parseFloat(document.getElementById('todayWeightIn').value);
  const waist = parseFloat(document.getElementById('todayWaistIn').value);
  if (!Number.isFinite(w) && !Number.isFinite(waist)) {
    if (typeof toast === 'function') toast('Add weight or waist first');
    return;
  }
  const date = todayKey();
  let a = lsGet('jae_body_logs_v1', []);
  const existing = a.find(x => x.date === date);
  a = a.filter(x => x.date !== date);
  
  const finalWeight = Number.isFinite(w) ? w : (existing ? existing.weight : null);
  const finalWaist = Number.isFinite(waist) ? waist : (existing ? existing.waist : null);
  
  a.unshift({
    date: date,
    weight: finalWeight,
    waist: finalWaist
  });
  lsSet('jae_body_logs_v1', a);
  if (typeof syncPush === 'function') syncPush('jae_body_logs_v1', a);
  
  if (typeof pushRemote === 'function') {
    pushRemote({
      type: 'body',
      date: date,
      weight: finalWeight,
      waist: finalWaist
    });
  }
  if (typeof toast === 'function') toast('Check-in saved ✓');
  renderToday();
};

window.saveTodayCoffee = function() {
  const date = todayKey();
  const k = 'jae_food_' + date;
  let fState = lsGet(k, null);
  var c = cfg();
  if (!fState) {
    fState = { meals: c.meals.map(() => false), water: 0, coffee: 0, supps: c.supps.map(() => 0) };
  }
  fState.coffee = Math.max(1, fState.coffee + 1);
  lsSet(k, fState);
  if (typeof syncPush === 'function') syncPush(k, fState);
  if (typeof pushRemote === 'function') {
    pushRemote({
      type: 'food',
      date: date,
      kcal: 0,
      protein: 0,
      water: fState.water,
      coffee: fState.coffee,
      meals: 'Coffee logged'
    });
  }
  if (typeof toast === 'function') toast('First coffee logged! ☕');
  renderToday();
};

window.saveTodaySupp = function(idx, dateStr) {
  const k = 'jae_food_' + dateStr;
  let fState = lsGet(k, null);
  var c = cfg();
  if (!fState) {
    fState = { meals: c.meals.map(() => false), water: 0, coffee: 0, supps: c.supps.map(() => 0) };
  }
  fState.supps[idx] = Math.max(1, (fState.supps[idx] || 0) + 1);
  lsSet(k, fState);
  if (typeof syncPush === 'function') syncPush(k, fState);
  
  if (typeof pushRemote === 'function') {
    pushRemote({
      type: 'food',
      date: dateStr,
      kcal: 0,
      protein: 0,
      water: fState.water,
      coffee: fState.coffee,
      meals: 'Supps: ' + c.supps[idx].name
    });
  }
  if (typeof toast === 'function') toast(c.supps[idx].name + ' logged ✓');
  renderToday();
};

window.onload = function() {
  goToday();
};
</script>
</body>
</html>
