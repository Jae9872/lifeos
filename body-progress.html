<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Progress · Life OS</title>
<style>
:root{--bg:#0b0c10;--card:#14161d;--card2:#1b1e27;--line:rgba(255,255,255,.12);--text:#eef1f6;--muted:rgba(236,240,250,.58);--accent:#6c8cff;--good:#34e2b0;--bad:#ff6b6b;--warn:#ffcf5d}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px}.app{max-width:460px;margin:auto;padding:16px 14px 30px}.top{position:sticky;top:0;margin:-16px -14px 16px;padding:16px 14px;background:rgba(11,12,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}a{color:var(--muted);text-decoration:none;font-size:13px}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-top:12px}h1{margin:4px 0 5px;font-size:24px;line-height:1.1}.muted{color:var(--muted);font-size:13px;margin:0}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.stat,.card,.row,.chart{background:var(--card);border:1px solid var(--line);border-radius:14px}.stat{text-align:center;padding:13px 8px}.stat b{display:block;font-size:20px}.stat span{display:block;font-size:11px;color:var(--muted);margin-top:2px}.card{padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}.field input{width:100%;padding:12px;border-radius:12px;background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:15px}.field.wide{grid-column:1/-1}button{font-family:inherit}.cta{width:100%;margin-top:12px;padding:14px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-weight:800;font-size:15px}.sect{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:20px 2px 9px}.chart{padding:12px;margin-bottom:12px}.chart svg{width:100%;height:auto;display:block}.legend{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-top:8px}.key{width:14px;height:3px;border-radius:2px;background:var(--accent);display:inline-block;margin-right:5px}.key.w{background:var(--warn)}.row{display:flex;align-items:center;gap:10px;padding:12px;margin-bottom:8px}.row main{flex:1}.row b{font-size:14px}.row small{display:block;color:var(--muted);font-size:12px;margin-top:2px}.delta{text-align:right;font-size:12px;color:var(--muted);min-width:62px}.delta.good{color:var(--good)}.delta.bad{color:var(--bad)}.del{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--muted);font-size:18px}.empty{text-align:center;color:var(--muted);padding:24px 14px;border:1px dashed var(--line);border-radius:14px;background:var(--card)}.hint{color:var(--muted);font-size:12.5px;margin-top:9px}.num{font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a href="index.html">← Back to Life OS</a>
    <div class="eyebrow">Body progress</div>
    <h1>Weight + waist tracker</h1>
    <p class="muted">Log it once a day. Watch the trend, not one random weigh-in.</p>
  </div>
  <div class="stats" id="stats"></div>
  <div class="card">
    <div class="grid">
      <div class="field"><label>Date</label><input id="dateIn" type="date"></div>
      <div class="field"><label>Weight, kg</label><input id="weightIn" type="number" step="0.05" placeholder="63.4"></div>
      <div class="field"><label>Waist, inches</label><input id="waistIn" type="number" step="0.1" placeholder="31.5"></div>
      <div class="field wide"><label>Note</label><input id="noteIn" placeholder="fasted, after gym, high salt day"></div>
    </div>
    <button class="cta" onclick="saveLog()">Save check-in</button>
    <div class="hint">Best rule: same time, same condition. Morning, after bathroom, before food.</div>
  </div>
  <div class="sect">Trend chart</div>
  <div class="chart" id="chart"></div>
  <div class="sect">Recent logs</div>
  <div id="list"></div>
</div>
<script>
const KEY='jae_body_logs_v1';
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getLogs(){try{return JSON.parse(localStorage.getItem(KEY)||'[]').sort((a,b)=>new Date(b.date)-new Date(a.date))}catch(e){return []}}
function setLogs(a){localStorage.setItem(KEY,JSON.stringify(a.slice(0,500)))}
function n(v,d){return Number.isFinite(v)?Number(v).toFixed(d):'—'}
function diff(v){return !Number.isFinite(v)?'—':(v>0?'+':'')+v.toFixed(1)}
function first(field,a){return a.slice().reverse().find(x=>Number.isFinite(x[field]))}
function last(field,a){return a.find(x=>Number.isFinite(x[field]))}
function avg7(field,a){const vals=a.filter(x=>Number.isFinite(x[field])).slice(0,7).map(x=>x[field]);return vals.length?vals.reduce((s,x)=>s+x,0)/vals.length:NaN}
function saveLog(){
 const date=document.getElementById('dateIn').value||todayKey();
 const weight=parseFloat(document.getElementById('weightIn').value);
 const waist=parseFloat(document.getElementById('waistIn').value);
 const note=document.getElementById('noteIn').value.trim();
 if(!Number.isFinite(weight)&&!Number.isFinite(waist)){alert('Add weight or waist first');return}
 const arr=getLogs().filter(x=>x.date!==date);
 arr.unshift({date,weight:Number.isFinite(weight)?weight:null,waist:Number.isFinite(waist)?waist:null,note});
 setLogs(arr);document.getElementById('noteIn').value='';render();
}
function delLog(date){if(confirm('Delete this check-in?')){setLogs(getLogs().filter(x=>x.date!==date));render()}}
function stat(v,k){return '<div class="stat"><b class="num">'+v+'</b><span>'+k+'</span></div>'}
function renderStats(a){
 const lw=last('weight',a),fw=first('weight',a),lws=last('waist',a),fws=first('waist',a);
 const wd=lw&&fw?lw.weight-fw.weight:NaN, waistd=lws&&fws?lws.waist-fws.waist:NaN;
 document.getElementById('stats').innerHTML=stat(lw?n(lw.weight,2):'—','weight kg')+stat(lws?n(lws.waist,1):'—','waist in')+stat(Number.isFinite(avg7('weight',a))?n(avg7('weight',a),2):'—','7-day avg')+stat(diff(wd),'kg change')+stat(diff(waistd),'waist change')+stat(a.length,'logs');
}
function renderList(a){
 const el=document.getElementById('list');if(!a.length){el.innerHTML='<div class="empty">No body logs yet. Add today’s weight or waist to start.</div>';return}
 el.innerHTML='';a.slice(0,30).forEach((x,i)=>{const pw=a.slice(i+1).find(p=>Number.isFinite(p.weight));const pwa=a.slice(i+1).find(p=>Number.isFinite(p.waist));const dw=(Number.isFinite(x.weight)&&pw)?x.weight-pw.weight:NaN;const dwa=(Number.isFinite(x.waist)&&pwa)?x.waist-pwa.waist:NaN;const d=new Date(x.date+'T00:00:00');const row=document.createElement('div');row.className='row';row.innerHTML='<main><b>'+d.toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'})+'</b><small>'+n(x.weight,2)+' kg · '+n(x.waist,1)+' in'+(x.note?' · '+escapeHtml(x.note):'')+'</small></main><div class="delta '+((dw<0||dwa<0)?'good':(dw>0||dwa>0)?'bad':'')+'">'+(Number.isFinite(dw)?diff(dw)+' kg':'')+'<br>'+(Number.isFinite(dwa)?diff(dwa)+' in':'')+'</div><button class="del" onclick="delLog(\''+x.date+'\')">×</button>';el.appendChild(row)})
}
function renderChart(a){
 const pts=a.slice().reverse().filter(x=>Number.isFinite(x.weight)||Number.isFinite(x.waist)).slice(-30);const el=document.getElementById('chart');if(!pts.length){el.innerHTML='<div class="empty">Chart appears after your first log.</div>';return}
 const W=320,H=170,pl=34,pr=14,pt=16,pb=28;const vals=[];pts.forEach(p=>{if(Number.isFinite(p.weight))vals.push(p.weight);if(Number.isFinite(p.waist))vals.push(p.waist)});let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1}const pad=(mx-mn)*.15;mn-=pad;mx+=pad;const xx=i=>pl+(pts.length===1?(W-pl-pr)/2:i*(W-pl-pr)/(pts.length-1));const yy=v=>pt+(1-(v-mn)/(mx-mn))*(H-pt-pb);
 let grid='';for(let i=0;i<4;i++){const y=pt+i*(H-pt-pb)/3;const val=mx-(mx-mn)*i/3;grid+='<line x1="'+pl+'" y1="'+y+'" x2="'+(W-pr)+'" y2="'+y+'" stroke="rgba(255,255,255,.07)"/><text x="'+(pl-6)+'" y="'+(y+3)+'" fill="rgba(255,255,255,.42)" font-size="9" text-anchor="end">'+val.toFixed(1)+'</text>'}
 function path(f){let p='';pts.forEach((x,i)=>{if(Number.isFinite(x[f]))p+=(p?'L':'M')+xx(i).toFixed(1)+' '+yy(x[f]).toFixed(1)+' '});return p}
 function dots(f,c){let s='';pts.forEach((x,i)=>{if(Number.isFinite(x[f]))s+='<circle cx="'+xx(i).toFixed(1)+'" cy="'+yy(x[f]).toFixed(1)+'" r="3.5" fill="'+c+'"/>'});return s}
 el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'">'+grid+'<path d="'+path('weight')+'" fill="none" stroke="#6c8cff" stroke-width="2.5"/><path d="'+path('waist')+'" fill="none" stroke="#ffcf5d" stroke-width="2.5"/>'+dots('weight','#6c8cff')+dots('waist','#ffcf5d')+'</svg><div class="legend"><span><i class="key"></i>Weight kg</span><span><i class="key w"></i>Waist in</span></div>'
}
function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function render(){const a=getLogs();renderStats(a);renderChart(a);renderList(a)}
document.getElementById('dateIn').value=todayKey();render();
</script>
</body>
</html>
